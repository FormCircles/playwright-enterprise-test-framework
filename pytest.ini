[pytest]
junit_family = xunit2
addopts = -ra --strict-markers
base_url = http://127.0.0.1:8080
testpaths = api_tests/tests ui_tests/tests
pythonpath = .

markers =
    smoke: critical fast tests used for PR and CI validation
    regression: broader functional test suite used for full validation
    api: tests that validate API endpoints, services, and API workflows
    ui: tests that validate browser-based user interface behavior
    auth: tests that validate authentication, authorization, login, logout, or access control
    slow: tests that are intentionally slower than the standard test suite